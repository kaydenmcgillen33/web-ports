<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Game Links</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: auto;
            padding: 20px;
            background: white;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        h1 {
            text-align: center;
            color: #333;
        }
        .game {
            margin: 15px 0;
            text-align: center;
        }
        .game-link {
            background-color: #28a745;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            text-decoration: none;
            font-size: 18px;
            transition: background-color 0.3s;
        }
        .game-link:hover {
            background-color: #218838;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Dynamic Game Links</h1>
        <div class="game">
            <a href="/game1/index.html" class="game-link">Play Game 1</a>
        </div>
        <div class="game">
            <a href="/game2/index.html" class="game-link">Play Game 2</a>
        </div>
        <div class="game">
            <a href="/game3/index.html" class="game-link">Play Game 3</a>
        </div>
        <!-- Add more games as needed -->
    </div>
</body>
</html>
